site_name: SeqTree
site_description: Sequential tree models for tabular synthetic data generation.
site_url: https://seqtree.readthedocs.io/
repo_url: https://github.com/seqtree/seqtree
repo_name: seqtree/seqtree

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Diagrams: diagrams.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_signature_annotations: true

strict: true
