site_name: SeqTrees
site_description: Sequential tree models for tabular synthetic data generation.
site_url: https://eulerlettersai.github.io/seqtrees/
repo_url: https://github.com/EulerLettersAI/seqtrees
repo_name: EulerLettersAI/seqtrees

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Home: index.md
  - Theoretical Background: theoretical_background.md
  - Comparison: comparison.md
  - Examples: examples.md
  - API Reference: api.md
  - Diagrams: diagrams.md

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

plugins:
  - search
  - bibtex:
      bib_file: docs/references.bib
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_signature_annotations: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/math.css

strict: true
